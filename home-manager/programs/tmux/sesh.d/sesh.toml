#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

blacklist = ["scratch"]

cache = false

[default_session]
startup_command = ""

[[session]]
name = "obsidian"
path = "~/Documents/obsidian/"
startup_command = "nvim"

[[session]]
name = "nix"
path = "~/.nix"
startup_command = "nvim"

[[session]]
name = "gemini"
path = "~/Documents/gemini"
startup_command = "gemini"

[[session]]
name = "main"
path = "~"

