# =====================================================================
#  GENERAL SETTINGS
# =====================================================================

# set -g prefix ^B
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
# set-option -g detach-on-destroy on
set -g focus-events on

# =====================================================================
#  TERMINAL & DISPLAY
# =====================================================================

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -g xterm-keys on
set -g default-shell "${SHELL}"

# =====================================================================
#  MOUSE & VI MODE
# =====================================================================

set -g mouse on
set-window-option -g mode-keys vi
bind -n M-w copy-mode

# =====================================================================
#  APPEARANCE
# =====================================================================

set -g allow-passthrough on
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{pane_current_command}"

# =====================================================================
#  KEYBINDINGS — GENERAL
# =====================================================================

bind ^X lock-server
bind ^C new-window -c "$HOME"
bind ^D detach
bind * list-clients

# =====================================================================
#  KEYBINDINGS — WINDOW
# =====================================================================

# --- Create ---
bind -n F2 new-window

# --- Navigate ---
bind H previous-window
bind , previous-window
bind -n F3 previous-window
bind -n S-Left previous-window

bind L next-window
bind . next-window
bind -n F4 next-window
bind -n S-Right next-window

bind ^A last-window
bind w list-windows

# --- Swap / Reorder ---
bind -n S-F3 swap-window -t -1 \; select-window -t -1
bind -n S-Down swap-window -t -1 \; select-window -t -1
bind -n S-F4 swap-window -t +1 \; select-window -t +1
bind -n S-Up swap-window -t +1 \; select-window -t +1

# --- Rename ---
bind -n F8 command-prompt -I "#W" "rename-window '%%'"
bind r command-prompt -I "#W" "rename-window '%%'"

# --- Reload / Refresh ---
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"
bind -n F5 source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"
bind L refresh-client \; display "Refreshed client"

# --- Detach ---
bind -n F6 detach-client

# --- Zoom ---
bind z resize-pane -Z

# =====================================================================
#  KEYBINDINGS — PANE
# =====================================================================

# --- Split ---
unbind %
bind '\' split-window -h -c '#{pane_current_path}'
unbind '"'
bind - split-window -v -c '#{pane_current_path}'

# --- Navigate ---
bind h select-pane -L
bind l select-pane -R
bind j select-pane -U
bind k select-pane -D

# --- Resize ---
bind -r -T prefix Left resize-pane -L 10
bind -r -T prefix Right resize-pane -R 10
bind -r -T prefix Down resize-pane -D 7
bind -r -T prefix Up resize-pane -U 7

# --- Misc ---
bind : command-prompt
bind * setw synchronize-panes
bind P set pane-border-status

# --- Kill ---
bind -n F12 kill-pane
bind x kill-pane

bind -n C-M-l send-key "echo 123"\; send-keys "Enter"

# =====================================================================
#  COPY MODE
# =====================================================================

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =====================================================================
#  SESSION — QUICK SWITCH (sesh)
# =====================================================================

bind -n M-O if-shell -F '#{==:#{session_name},obsidian}' 'switch-client -l' 'run-shell "sesh connect obsidian"'
bind -n M-N if-shell -F '#{==:#{session_name},nix}'      'switch-client -l' 'run-shell "sesh connect nix"'
bind -n M-G if-shell -F '#{==:#{session_name},gemini}'   'switch-client -l' 'run-shell "sesh connect gemini"'
bind -n M-M if-shell -F '#{==:#{session_name},main}'     'switch-client -l' 'run-shell "sesh connect main"'

# --- Fuzzy session picker (fzf + sesh) ---
bind -n M-J display-popup -E -h 100% -w 100% "sesh connect \"$(
  sesh list -i | fzf --no-sort --ansi --prompt='⚡ '
)\""
