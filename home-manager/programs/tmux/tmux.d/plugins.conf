# =============================================================================
# yank — copy to system clipboard
# https://github.com/tmux-plugins/tmux-yank
# =============================================================================
set -g @yank_action 'copy-pipe'

# =============================================================================
# power-theme — status bar theme
# https://github.com/wfxr/tmux-power
# =============================================================================
set -g @tmux_power_time_format '%H:%M'

# =============================================================================
# resurrect — save and restore sessions
# https://github.com/tmux-plugins/tmux-resurrect
# =============================================================================
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# =============================================================================
# continuum — automatic session saving
# https://github.com/tmux-plugins/tmux-continuum
# =============================================================================
set -g @continuum-restore 'on'

# =============================================================================
# floax — floating pane
# https://github.com/omerxx/tmux-floax
# =============================================================================
set -g @floax-bind 't'
set -g @floax-width '80%'
set -g @floax-height '80%'

# =============================================================================
# sessionx — session manager
# https://github.com/omerxx/tmux-sessionx
# =============================================================================
set -g @sessionx-prefix off
set -g @sessionx-bind 'M-space'
set -g @sessionx-window-height '100%'
set -g @sessionx-window-width '100%'
set -g @sessionx-bind-kill-session 'ctrl-w'
set -g @sessionx-bind-window-mode 'ctrl-s'
