# uvx dotbrowser vivaldi apply ~nix/home-manager/dotfiles/browser/dotbrowser/vivaldi.toml -k 

[shortcuts]

# vim-style hjkl: Alt+H/L for history, Alt+J/K for tab switching (MRU).
COMMAND_PAGE_BACK                  = ["alt+h"]
COMMAND_PAGE_FORWARD               = ["alt+l"]
COMMAND_TAB_SWITCH_BACK_HISTORY    = ["alt+k"]
COMMAND_TAB_SWITCH_FORWARD_HISTORY = ["alt+j"]

COMMAND_NEW_TAB              = ["ctrl+t"]
COMMAND_CLOSE_TAB            = ["ctrl+w"]
COMMAND_PAGE_REFRESH         = ["ctrl+r"]
COMMAND_PAGE_RELOAD_NOCACHE  = ["ctrl+shift+r"]
COMMAND_FOCUS_SEARCHFIELD    = ["ctrl+s"]
COMMAND_FIND_IN_PAGE         = ["ctrl+f"]
COMMAND_SHOW_DOWNLOADS_PANEL = ["ctrl+j"]
COMMAND_SHOW_HISTORY         = ["ctrl+h"]
COMMAND_ADD_BOOKMARK         = ["ctrl+d"]
COMMAND_FOCUS_ADDRESSFIELD   = ["ctrl+l"]

[settings]

"vivaldi.tabs.bar.position" = 1  # 0=top, 1=left, 2=right, 3=bottom

[pwa]

urls = [
  "https://gemini.google.com",
  "https://claude.ai/new",
  "https://keep.google.com",
  "https://www.youtube.com",
  "https://chat.deepseek.com",
  "https://mail.google.com/",
  "https://www.notion.so/",
  "https://discord.com/app",
  "https://www.facebook.com/messages",
  "https://www.messenger.com",
  "https://web.telegram.org",
]

