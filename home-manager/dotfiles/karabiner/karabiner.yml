profiles:
  - complex_modifications:
      rules:
  ################################################################
  #             Capslock to Esc / Cmd+Ctrl+Opt                   #
  ################################################################
        - manipulators:
            - description: Change caps_lock to command+control+option or escape
              from:
                key_code: caps_lock
                modifiers:
                  optional:
                    - any
              to:
                - key_code: right_command
                  modifiers:
                    - right_control
                    - right_option
              to_if_alone:
                - key_code: escape
              type: basic
  ################################################################
  #                 Tab to Tab / Cmd+Ctrl+Opt+Shift              #
  ################################################################
        - manipulators:
            - description: Change tab to command+control+option+shift.
              from:
                key_code: tab
                modifiers:
                  optional:
                    - any
              to:
                - key_code: right_shift
                  modifiers:
                    - right_command
                    - right_control
                    - right_option
              to_if_alone:
                - key_code: tab
              type: basic
  ################################################################
  #                 Tab + H/J/K/L to arrow keys                  #
  ################################################################
        - description: Tab + H/J/K/L to arrow keys
          manipulators:
      #==========================================================#
      #                Tab + H -> left_arrow                     #
      #==========================================================#
            - description: tab + h = left_arrow
              type: basic
              from:
                key_code: h
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: left_arrow
      #==========================================================#
      #                Tab + J -> down_arrow                     #
      #==========================================================#
            - description: tab + j = down_arrow
              type: basic
              from:
                key_code: j
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: down_arrow
      #==========================================================#
      #                Tab + K -> up_arrow                       #
      #==========================================================#
            - description: tab + k = up_arrow
              type: basic
              from:
                key_code: k
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: up_arrow
      #==========================================================#
      #                Tab + L -> right_arrow                    #
      #==========================================================#
            - description: tab + l = right_arrow
              type: basic
              from:
                key_code: l
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: right_arrow
  ################################################################
  #          Tab + Y/U/I/O to home/PgDn/PgUp/End                 #
  ################################################################
        - description: Tab + Y/U/I/O to home/PgDn/PgUp/End
          manipulators:
      #==========================================================#
      #                Tab + Y -> home                           #
      #==========================================================# 
            - description: tab + y = home
              type: basic
              from:
                key_code: y
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: home
      #==========================================================#
      #                Tab + U -> page_down                      #
      #==========================================================#
            - description: tab + u = page_down
              type: basic
              from:
                key_code: u
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: page_down
      #==========================================================#
      #                Tab + I -> page_up                        #
      #==========================================================#
            - description: tab + i = page_up
              type: basic
              from:
                key_code: i
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: page_up
      #==========================================================#
      #                Tab + O -> end                            #
      #==========================================================#
            - description: tab + o = end
              type: basic
              from:
                key_code: o
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: end
  ################################################################
  #                       Hyper Clipboard                        #
  ################################################################
        - description: 'Hyper Clipboard: hyper + number to copy to that clip, tab + number to paste from that clip'
          manipulators:
            - description: hypr + 1 = copy to clip1
              type: basic
              from:
                key_code: "1"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_option
              to:
                - key_code: c
                  modifiers:
                    - left_command
                - shell_command: pbpaste > /tmp/clip1
            - description: tab + 1 = paste from clip1
              type: basic
              from:
                key_code: "1"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - shell_command: 'cat /tmp/clip1 | pbcopy '
                - key_code: v
                  modifiers:
                    - left_command
            - description: hypr + 2 = copy to clip2
              type: basic
              from:
                key_code: "2"
                modifiers:
                  mandatory:
