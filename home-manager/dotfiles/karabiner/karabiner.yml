profiles:
  - complex_modifications:
      parameters:
        basic.simultaneous_threshold_milliseconds: 50
        basic.to_delayed_action_delay_milliseconds: 200
        basic.to_if_alone_timeout_milliseconds: 1000
        basic.to_if_held_down_threshold_milliseconds: 200
          
      rules:
        ################################################################
        #                        Homerow mode                          #
        ################################################################
        - description: Homerow mode
          manipulators:
            #==========================================================#
            #              f : left_ctrl / j right_ctrl                #    
            #==========================================================#
            - description: f = left_control
              from:
                key_code: f
                modifiers:
                  optional:
                    - any
              to_if_alone:
                - key_code: f
                  halt: true
              to_if_held_down:
                - key_code: left_control
                  halt: true
              to_delayed_action:
                to_if_invoked:
                  - key_code: vk_none
                to_if_canceled:
                  - key_code: f
              type: basic
            - description: j = right_control
              from:
                key_code: j
                modifiers:
                  optional:
                    - any
              to_if_alone:
                - key_code: j
                  halt: true
              to_if_held_down:
                - key_code: right_control
                  halt: true
              to_delayed_action:
                to_if_invoked:
                  - key_code: vk_none
                to_if_canceled:
                  - key_code: j
              type: basic
            #==========================================================#
            #             d : left_command / k right_command           #
            #==========================================================#
            - description: d = left_command
              from:
                key_code: d
                modifiers:
                  optional:
                    - any
              to_if_alone:
                - key_code: d
                  halt: true
              to_if_held_down:
                - key_code: left_command
                  halt: true
              to_delayed_action:
                to_if_invoked:
                  - key_code: vk_none
                to_if_canceled:
                  - key_code: d
              type: basic
            - description: k = right_command
              from:
                key_code: k
                modifiers:
                  optional:
                    - any
              to_if_alone:
                - key_code: k
                  halt: true
              to_if_held_down:
                - key_code: right_command
                  halt: true
              to_delayed_action:
                to_if_invoked:
                  - key_code: vk_none
                to_if_canceled:
                  - key_code: k
              type: basic
            #==========================================================#
            #             s : left_option / l right_option             #
            #==========================================================#
            - description: s = left_option
              from:
                key_code: s
                modifiers:
                  optional:
                    - any
              to_if_alone:
                - key_code: s
                  halt: true
              to_if_held_down:
                - key_code: left_option
                  halt: true
              to_delayed_action:
                to_if_invoked:
                  - key_code: vk_none
                to_if_canceled:
                  - key_code: s
              type: basic
            - description: l = right_option
              from:
                key_code: l
                modifiers:
                  optional:
                    - any
              to_if_alone:
                - key_code: l
                  halt: true
              to_if_held_down:
                - key_code: right_option
                  halt: true
              to_delayed_action:
                to_if_invoked:
                  - key_code: vk_none
                to_if_canceled:
                  - key_code: l
              type: basic

            
        ################################################################
        #           Change modifier keys behavior                       #
        ################################################################
        - description: Change modifier keys behavior
          manipulators:
            #==========================================================#
            #             Capslock to Esc / Cmd+Ctrl+Opt               #
            #==========================================================#
            - description: Change caps_lock to command+control+option or escape
              from:
                key_code: caps_lock
                modifiers:
                  optional:
                    - any
              to:
                - key_code: right_command
                  modifiers:
                    - right_control
                    - right_option
              to_if_alone:
                - key_code: escape
              type: basic
            #========================================================#
            #                 Tab to Tab / Cmd+Ctrl+Opt+Shift        #
            #========================================================#
            - description: Change tab to command+control+option+shift.
              from:
                key_code: tab
                modifiers:
                  optional:
                    - any
              to:
                - key_code: right_shift
                  modifiers:
                    - right_command
                    - right_control
                    - right_option
              to_if_alone:
                - key_code: tab
              type: basic
            #========================================================#
            #          Right Shift to Paste / Shift  .               #
            #========================================================#
            - description: Change right_shift to Paste / Shift 
              from:
                key_code: right_shift
                modifiers:
                  optional:
                    - any
              to:
                - key_code: right_shift
              to_if_alone:
                - key_code: v
                  modifiers:
                    - left_command
              type: basic
            #========================================================#
            #           Left Control to Copy, Left Opt to Paste      #
            #========================================================#
            - description: Change left_control to copy
              from:
                key_code: left_control
                modifiers:
                  optional:
                    - any
              to:
                - key_code: left_control
              to_if_alone:
                - key_code: c
                  modifiers:
                    - left_command
              type: basic
            - description: Change left_option to paste
              from:
                key_code: left_option
                modifiers:
                  optional:
                    - any
              to:
                - key_code: left_option
              to_if_alone:
                - key_code: v
                  modifiers:
                    - left_command
              type: basic
            #========================================================#
            #               Right Ctrl to Copy / Ctrl                #
            #========================================================#
            - description: Change right_control to copy
              from:
                key_code: right_control
                modifiers:
                  optional:
                    - any
              to:
                - key_code: right_control
              to_if_alone:
                - key_code: c
                  modifiers:
                    - left_command
              type: basic

        ################################################################
        #                 Tab + H/J/K/L to arrow keys                  #
        ################################################################
        - description: Tab + H/J/K/L to arrow keys
          manipulators:
            #==========================================================#
            #                Tab + H -> left_arrow                     #
            #==========================================================#
            - description: tab + h = left_arrow
              type: basic
              from:
                key_code: h
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: left_arrow
            #==========================================================#
            #                Tab + J -> down_arrow                     #
            #==========================================================#
            - description: tab + j = down_arrow
              type: basic
              from:
                key_code: j
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: down_arrow
            #==========================================================#
            #                Tab + K -> up_arrow                       #
            #==========================================================#
            - description: tab + k = up_arrow
              type: basic
              from:
                key_code: k
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: up_arrow
            #==========================================================#
            #                Tab + L -> right_arrow                    #
            #==========================================================#
            - description: tab + l = right_arrow
              type: basic
              from:
                key_code: l
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: right_arrow
        ################################################################
        #          Tab + Y/U/I/O to home/PgDn/PgUp/End                 #
        ################################################################
        - description: Tab + Y/U/I/O to home/PgDn/PgUp/End
          manipulators:
            #==========================================================#
            #                Tab + Y -> home                           #
            #==========================================================#
            - description: tab + y = home
              type: basic
              from:
                key_code: y
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: home
            #==========================================================#
            #                Tab + U -> page_down                      #
            #==========================================================#
            - description: tab + u = page_down
              type: basic
              from:
                key_code: u
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: page_down
            #==========================================================#
            #                Tab + I -> page_up                        #
            #==========================================================#
            - description: tab + i = page_up
              type: basic
              from:
                key_code: i
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: page_up
            #==========================================================#
            #                Tab + O -> end                            #
            #==========================================================#
            - description: tab + o = end
              type: basic
              from:
                key_code: o
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: end
        ################################################################
        #                       Other behavior                         #
        ################################################################
        - description: Other behavior
          manipulators:
            #==========================================================#
            #           tab + ` --> area selection snapshot            #
            #==========================================================#
            - description: "tab + ` = area snap to desktop file"
              type: basic
              from:
                key_code: grave_accent_and_tilde
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: "4"
                  modifiers:
                    - left_command
                    - left_control
                    - left_shift
        ################################################################
        #                    Audio and Brightness                      #
        ################################################################
        - description: Audio and Brightness Controls
          manipulators:
            #==========================================================#
            #           Cap + plus/minus to volume up/down          #
            #==========================================================#
            - description: "cap + plus = volume_up"
              type: basic
              from:
                key_code: equal_sign
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_option
              to:
                - key_code: volume_increment
            - description: "cap + minus = volume_down"
              type: basic
              from:
                key_code: hyphen
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_option
              to:
                - key_code: volume_decrement
            #==========================================================#
            #               Cap + 0 to mute/unmute                     #
            #==========================================================#
            - description: "cap + 0 = mute/unmute"

              type: basic
              from:
                key_code: "0"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_option
              to:
                - key_code: mute
            #==========================================================#
            #         Tab + plus/minus to brightness up/down          #
            #==========================================================#
            - description: "tab + plus = brightness_up"
              type: basic
              from:
                key_code: equal_sign
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: display_brightness_increment
            - description: "tab + minus = brightness_down"
              type: basic
              from:
                key_code: hyphen
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - key_code: display_brightness_decrement
        ################################################################
        #                       Hyper Clipboard                        #
        ################################################################
        - description: "Hyper Clipboard: hyper + number to copy to that clip, tab + number to paste from that clip"
          manipulators:
            - description: hypr + 1 = copy to clip1
              type: basic
              from:
                key_code: "1"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_option
              to:
                - key_code: c
                  modifiers:
                    - left_command
                - shell_command: pbpaste > /tmp/clip1
            - description: tab + 1 = paste from clip1
              type: basic
              from:
                key_code: "1"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - shell_command: "cat /tmp/clip1 | pbcopy "
                - key_code: v
                  modifiers:
                    - left_command
            - description: hypr + 2 = copy to clip2
              type: basic
              from:
                key_code: "2"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_option
              to:
                - key_code: c
                  modifiers:
                    - left_command
                - shell_command: pbpaste > /tmp/clip2
            - description: tab + 2 = paste from clip2
              type: basic
              from:
                key_code: "2"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - shell_command: "cat /tmp/clip2 | pbcopy "
                - key_code: v
                  modifiers:
                    - left_command
            - description: hypr + 3 = copy to clip3
              type: basic
              from:
                key_code: "3"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_option
              to:
                - key_code: c
                  modifiers:
                    - left_command
                - shell_command: pbpaste > /tmp/clip3
            - description: tab + 3 = paste from clip3
              type: basic
              from:
                key_code: "3"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - shell_command: "cat /tmp/clip3 | pbcopy "
                - key_code: v
                  modifiers:
                    - left_command
            - description: hypr + 4 = copy to clip4
              type: basic
              from:
                key_code: "4"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_option
              to:
                - key_code: c
                  modifiers:
                    - left_command
                - shell_command: pbpaste > /tmp/clip4
            - description: tab + 4 = paste from clip4
              type: basic
              from:
                key_code: "4"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - shell_command: "cat /tmp/clip4 | pbcopy "
                - key_code: v
                  modifiers:
                    - left_command
            - description: hypr + 5 = copy to clip5
              type: basic
              from:
                key_code: "5"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_option
              to:
                - key_code: c
                  modifiers:
                    - left_command
                - shell_command: pbpaste > /tmp/clip5
            - description: tab + 5 = paste from clip5
              type: basic
              from:
                key_code: "5"
                modifiers:
                  mandatory:
                    - right_command
                    - right_control
                    - right_shift
                    - right_option
              to:
                - shell_command: "cat /tmp/clip5 | pbcopy "
                - key_code: v
                  modifiers:
                    - left_command
    name: Default profile
    selected: true
