- description: Change modifier keys behavior
  manipulators:
    #==========================================================#
    #             Capslock to Esc / Cmd+Ctrl+Opt               #
    #==========================================================#
    - description: Change caps_lock to command+control+option or escape
      from:
        key_code: caps_lock
        modifiers:
          optional:
            - any
      to:
        - key_code: right_command
          modifiers:
            - right_control
            - right_option
      to_if_alone:
        - key_code: escape
      type: basic
    #========================================================#
    #                 Tab to Tab / Cmd+Ctrl+Opt+Shift        #
    #========================================================#
    - description: Change tab to command+control+option+shift.
      from:
        key_code: tab
        modifiers:
          optional:
            - any
      to:
        - key_code: right_shift
          modifiers:
            - right_command
            - right_control
            - right_option
      to_if_alone:
        - key_code: tab
      type: basic
    #========================================================#
    #          Right Shift to Paste / Shift  .               #
    #========================================================#
    - description: Change right_shift to Paste / Shift 
      from:
        key_code: right_shift
        modifiers:
          optional:
            - any
      to:
        - key_code: right_shift
      to_if_alone:
        - key_code: v
          modifiers:
            - left_command
      type: basic
    #========================================================#
    #           Left Control to Copy, Left Opt to Paste      #
    #========================================================#
    - description: Change left_control to copy
      from:
        key_code: left_control
        modifiers:
          optional:
            - any
      to:
        - key_code: left_control
      to_if_alone:
        - key_code: c
          modifiers:
            - left_command
      type: basic
    - description: Change left_option to paste
      from:
        key_code: left_option
        modifiers:
          optional:
            - any
      to:
        - key_code: left_option
      to_if_alone:
        - key_code: v
          modifiers:
            - left_command
      type: basic
    #========================================================#
    #               Right Ctrl to Copy / Ctrl                #
    #========================================================#
    - description: Change right_control to copy
      from:
        key_code: right_control
        modifiers:
          optional:
            - any
      to:
        - key_code: right_control
      to_if_alone:
        - key_code: c
          modifiers:
            - left_command
      type: basic

- description: Tab + H/J/K/L to arrow keys
  manipulators:
    #==========================================================#
    #                Tab + H -> left_arrow                     #
    #==========================================================#
    - description: tab + h = left_arrow
      type: basic
      from:
        key_code: h
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_shift
            - right_option
      to:
        - key_code: left_arrow
    #==========================================================#
    #                Tab + J -> down_arrow                     #
    #==========================================================#
    - description: tab + j = down_arrow
      type: basic
      from:
        key_code: j
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_shift
            - right_option
      to:
        - key_code: down_arrow
    #==========================================================#
    #                Tab + K -> up_arrow                       #
    #==========================================================#
    - description: tab + k = up_arrow
      type: basic
      from:
        key_code: k
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_shift
            - right_option
      to:
        - key_code: up_arrow
    #==========================================================#
    #                Tab + L -> right_arrow                    #
    #==========================================================#
    - description: tab + l = right_arrow
      type: basic
      from:
        key_code: l
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_shift
            - right_option
      to:
        - key_code: right_arrow
