- description: Tab + A C X Z
  manipulators:
    #==========================================================#
    #               tab + a --> select all                     # 
    #==========================================================#
    - description: "tab + a = select_all"
      type: basic
      from:
        key_code: a
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_shift
            - right_option
      to:
        - key_code: "a"
          modifiers:
            - left_command
    #==========================================================#
    #               tab + c --> copy                           #
    #==========================================================#
    - description: "tab + c = copy"
      type: basic
      from:
        key_code: c
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_shift
            - right_option
      to:
        - key_code: "c"
          modifiers:
            - left_command
    #==========================================================#
    #               tab + x --> cut                            #
    #==========================================================#
    - description: "tab + x = cut"
      type: basic
      from:
        key_code: x
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_shift
            - right_option
      to:
        - key_code: "x"
          modifiers:
            - left_command
    #==========================================================#
    #               tab + z --> undo                           #
    #==========================================================#
    - description: "tab + v = paste"
      type: basic
      from:
        key_code: v
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_shift
            - right_option
      to:
        - key_code: "v"
          modifiers:
            - left_command