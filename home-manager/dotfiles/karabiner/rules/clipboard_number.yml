- description: "Hyper Clipboard: hyper + number to copy to that clip, tab + number to paste from that clip"
  manipulators:
    - description: hypr + 1 = copy to clip1
      type: basic
      from:
        key_code: "1"
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_option
      to:
        - key_code: c
          modifiers:
            - left_command
        - shell_command: pbpaste > /tmp/clip1
    - description: tab + 1 = paste from clip1
      type: basic
      from:
        key_code: "1"
        modifiers:
          mandatory:
            - right_command
            - right_control
            - right_shift
            - right_option
      to:
        - shell_command: "cat /tmp/clip1 | pbcopy "
        - key_code: v
          modifiers:
            - left_command
