# Volume control
set $dunstify-volume dunstify -r 999 "$(wpctl get-volume @DEFAULT_AUDIO_SINK@)"
bindsym XF86AudioRaiseVolume exec wpctl set-volume --limit 2.0 @DEFAULT_AUDIO_SINK@ 10%+ && $dunstify-volume
bindsym XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%- && $dunstify-volume
bindsym XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && $dunstify-volume

# Microphone mute
set $dunstify-microphone dunstify -r 999 "$(wpctl get-volume @DEFAULT_AUDIO_SOURCE@)"
bindsym XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && $dunstify-microphone

# Brightness control
set $dunstify-brightness dunstify -r 999 "$(brightnessctl -m)"
bindsym XF86MonBrightnessUp exec brightnessctl set 10%+ && $dunstify-brightness
bindsym XF86MonBrightnessDown exec brightnessctl set 10%- && $dunstify-brightness

# Screenshot (grim + slurp replaces maim)
bindsym Print exec grim -g "$(slurp)" - | wl-copy
bindsym $tab+grave exec grim -g "$(slurp)" - | wl-copy

# Battery
bindsym $tab+p exec dunstify -r 999 "$(acpi -b)"

# Time
bindsym $tab+t exec dunstify -r 999 "$(date +'%H:%M:%S - %d/%m/%Y')"
