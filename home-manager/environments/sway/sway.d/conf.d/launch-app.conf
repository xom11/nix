# vim: ft=swayconfig

bindsym $mod+Return exec kitty

# sway-beckon.sh <WORKSPACE> <BECKON_ID>: strict app-per-workspace, no flicker.
# Uses `beckon -r` to resolve and `swaymsg [app_id=...] move ... ; workspace ...`
# so the destination workspace is never displayed empty mid-transition.
# Beckon resolves BECKON_ID via .desktop Name (exact / substring), filename, or
# StartupWMClass — friendly names are stable across machines (PWA hashes aren't).
# Discover: `beckon -L` (installed) / `beckon -l` (running) / `beckon -s <q>`.
set $focus exec ~/.config/sway/scripts/sway-beckon.sh

# Native apps
bindsym $cap+space $focus "1:kitty"    kitty
bindsym $cap+b     $focus "2:brave"    Brave

# Brave PWAs — match by .desktop Name field
bindsym $cap+g       $focus "3:gemini"    Gemini
bindsym $cap+c       $focus "4:claude"    Claude
bindsym $cap+k       $focus "5:keep"      "Google Keep"
bindsym $cap+y       $focus "6:youtube"   YouTube
bindsym $cap+shift+d $focus "7:deepseek"  DeepSeek
bindsym $cap+shift+m $focus "8:gmail"     Gmail
bindsym $cap+shift+n $focus "9:notion"    Notion
bindsym $cap+d       $focus "10:discord"  Discord
bindsym $cap+m       $focus "11:facebook" Facebook
# Note: native `org.telegram.desktop` is also installed (Name="Telegram"),
# so we use the PWA's exact Name to disambiguate.
bindsym $cap+t       $focus "12:telegram" "Telegram Web"

focus_on_window_activation focus

