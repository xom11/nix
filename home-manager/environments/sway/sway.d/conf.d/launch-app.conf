bindsym $mod+Return exec kitty

set $focus exec ~/.config/sway/scripts/sway-focus.sh
set $toggle exec ~/.config/sway/scripts/sway-toggle.sh

# Kitty
bindsym $cap+space $focus "kitty" "kitty"

# Browser (native wayland)
set $browser vivaldi-stable --ozone-platform=wayland --enable-features=UseOzonePlatform

bindsym $cap+b $focus $browser
# Web Apps
bindsym $cap+g       $focus $browser --app=https://gemini.google.com
bindsym $cap+c       $focus $browser --app=https://claude.ai/new
bindsym $cap+k       $focus $browser --app=https://keep.google.com
bindsym $cap+y       $focus $browser --app=https://www.youtube.com
bindsym $cap+shift+d $focus $browser --app=https://chat.deepseek.com
bindsym $cap+shift+m $focus $browser --app=https://mail.google.com/
bindsym $cap+shift+n $focus $browser --app=https://www.notion.so/
bindsym $cap+d       $focus $browser --app=https://discord.com/app
bindsym $cap+m       $focus $browser --app=https://www.facebook.com/messages
bindsym $cap+t       $focus $browser --app=https://web.telegram.org

focus_on_window_activation focus
