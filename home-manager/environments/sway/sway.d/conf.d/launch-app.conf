# vim: ft=swayconfig

bindsym $mod+Return exec kitty

# beckon = thin focus-or-launch wrapper. Resolves the argument via:
#   1. .desktop `Name=` exact (case-insensitive)
#   2. .desktop filename
#   3. StartupWMClass
#   4. .desktop `Name=` substring (alphabetical first wins, like rofi)
# Names are stable across machines (Brave PWA hashes are not).
# Discover: `beckon -L` (installed) / `beckon -l` (running) / `beckon -s <q>`.
# Rollback: comment beckon line, uncomment script line.
# set $focus exec ~/.config/sway/scripts/sway-focus.sh
set $focus exec beckon

# Native apps
bindsym $cap+space $focus kitty
bindsym $cap+b     $focus Brave

# Brave PWAs — match by .desktop Name field
bindsym $cap+g       $focus Gemini
bindsym $cap+c       $focus Claude
bindsym $cap+k       $focus "Google Keep"
bindsym $cap+y       $focus YouTube
bindsym $cap+shift+d $focus DeepSeek
bindsym $cap+shift+m $focus Gmail
bindsym $cap+shift+n $focus Notion
bindsym $cap+d       $focus Discord
bindsym $cap+m       $focus Facebook
# Note: native `org.telegram.desktop` is also installed (Name="Telegram"),
# so we use the PWA's exact Name to disambiguate.
bindsym $cap+t       $focus "Telegram Web"

focus_on_window_activation focus

