# =============================================================================
# Idle & Lock
# =============================================================================
# lock after 15min, screen off after 30min, lock before sleep
exec swayidle -w \
    timeout 900 'swaylock -f' \
    timeout 1800 'swaymsg "output * power off"' resume 'swaymsg "output * power on"' \
    before-sleep 'swaylock -f'

# suspend when closing lid
bindswitch --reload --locked lid:on exec systemctl suspend

# =============================================================================
# Power Keybindings
# =============================================================================
bindsym $mod+$alt+l           exec swaylock
bindsym $mod+$alt+Shift+l     exec "echo -e 'Yes\nNo' | rofi -dmenu -p 'Exit sway session?' | grep -q Yes && swaymsg exit"
bindsym $mod+$alt+Shift+r     exec "echo -e 'Yes\nNo' | rofi -dmenu -p 'Reboot the system?' | grep -q Yes && systemctl reboot"
bindsym $mod+$alt+Shift+s     exec "echo -e 'Yes\nNo' | rofi -dmenu -p 'Shutdown the system?' | grep -q Yes && systemctl poweroff"
bindsym $mod+$alt+Shift+h     exec "echo -e 'Yes\nNo' | rofi -dmenu -p 'Hibernate the system?' | grep -q Yes && systemctl hibernate"

# =============================================================================
# Input
# =============================================================================
input "type:keyboard" {
    repeat_rate 30
    repeat_delay 300
}

input "type:touchpad" {
    pointer_accel -0.3
    natural_scroll enabled
    tap enabled
    dwt enabled
    scroll_method two_finger
    middle_emulation enabled
}

input "type:pointer" {
    pointer_accel -0.2
}

# =============================================================================
# Background Services
# =============================================================================
# notifications (mako = native wayland)
exec mako

# wallpaper
exec_always swaybg -i ~/.nix/home-manager/dotfiles/images/nix-waifu.png -m fill

# clipboard history
exec wl-paste --watch cliphist store

# display auto-switch (wayland autorandr)
exec_always kanshi

# auto-tiling
exec_always autotiling

# vietnamese input
exec_always fcitx5 -rd

# =============================================================================
# Launchers (rofi)
# =============================================================================
bindsym $mod+d        exec rofi -normal-window -show drun
bindsym $mod+space    exec rofi -normal-window -show combi
bindsym $alt+Tab      exec rofi -normal-window -show window
