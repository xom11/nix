# notification (mako = native wayland)
exec mako

# background
exec_always swaybg -i ~/.nix/home-manager/dotfiles/images/nix-waifu.png -m fill

# clipboard
exec wl-paste --watch cliphist store

# display auto-switch (wayland autorandr)
exec_always kanshi

# idle management: lock after 5min, screen off after 10min, lock before sleep
exec swayidle -w \
    timeout 300 'swaylock -f' \
    timeout 600 'swaymsg "output * power off"' resume 'swaymsg "output * power on"' \
    before-sleep 'swaylock -f'

# lid switch: suspend when closing lid
bindswitch --reload --locked lid:on exec systemctl suspend

# rofi
bindsym $mod+d exec rofi -normal-window -show drun
bindsym $mod+space exec rofi -normal-window -show combi
bindsym $alt+Tab exec rofi -normal-window -show window

exec_always autotiling

# vietnamese input
exec_always fcitx5 -rd

# keyboard repeat rate and delay
input "type:keyboard" {
    repeat_rate 30
    repeat_delay 200
}

# touchpad
input "type:touchpad" {
    natural_scroll enabled
    tap enabled
    dwt enabled
    scroll_method two_finger
    middle_emulation enabled
}
