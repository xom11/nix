bindsym $mod+Return exec --no-startup-id kitty

set $focus exec --no-startup-id ~/.config/i3/scripts/i3-focus.sh
# TODO: more intelligent way to toggle window floating/tiled
set $toggle exec --no-startup-id ~/.config/i3/scripts/i3-toggle.sh

# Kitty
bindsym $cap+space $focus "kitty" "kitty"

# Browser (change $browser to switch e.g. brave, chromium, google-chrome-stable)
set $browser brave
set $browser_wm_class brave-browser

bindsym $cap+b $focus $browser_wm_class $browser
# Web Apps
bindsym $cap+g       $focus "gemini.google.com" "$browser --app=https://gemini.google.com"
bindsym $cap+c       $focus "claude.ai__new" "$browser --app=https://claude.ai/new"
bindsym $cap+k       $focus "keep.google.com" "$browser --app=https://keep.google.com"
bindsym $cap+y       $focus "www.youtube.com" "$browser --app=https://www.youtube.com"
bindsym $cap+shift+d $focus "chat.deepseek.com" "$browser --app=https://chat.deepseek.com"
bindsym $cap+shift+m $focus "mail.google.com" "$browser --app=https://mail.google.com/"
bindsym $cap+shift+n $focus "www.notion.so" "$browser --app=https://www.notion.so/"
bindsym $cap+d       $focus "discord.com__app" "$browser --app=https://discord.com/app"
# bindsym $cap+m       $focus "www.messenger.com" "$browser --app=https://www.messenger.com"
bindsym $cap+m       $focus "www.facebook.com__messages" "$browser --app=https://www.facebook.com/messages"
bindsym $cap+t       $focus "web.telegram.org" "$browser --app=https://web.telegram.org"

focus_on_window_activation focus
